<!DOCTYPE html>
<html lang="en">
<head>

      <div class="card">
        <div class="card-avatar">

        <p class="bio">Student</p>

        <p class="bio">Student</p>

        <p class="role">Developer/Designer</p>
        <p class="bio">Student</p>
      </div>
      
      <div class="card">
        <div class="card-avatar">
          <img src="assets/profiles/Dhruv.jpg" alt="Dhruv Patel profile photo" />

  <footer>
    <p>&copy; Spring 2026 COIL Project</p>

</html>
